<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Boss Dashboard</title>
    <meta charset="UTF-8">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .header{
            background:#1f3a5f;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header a{
            color:#1f3a5f;
            background:white;
            padding:8px 14px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .container{
            width:90%;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:20px;
        }

        .search-box{
            margin-bottom:20px;
            display:flex;
            gap:10px;
        }

        .search-box input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .search-box button{
            padding:10px 15px;
            border:none;
            background:#2e8b57;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#1f3a5f;
            color:white;
        }
    </style>
</head>
<body>

<div class="header">
    <h3>Boss Dashboard</h3>
    <a th:href="@{/logout}">Logout</a>
</div>

<div class="container">
    <h2>All Records</h2>

    <form class="search-box" th:action="@{/boss/search}" method="post">
        <input type="date" name="recordDate" required>
        <button type="submit">Search</button>
    </form>

    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Employee</th>
            <th>Gross</th>
            <th>Wins</th>
            <th>Shortages</th>
            <th>Balance</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="record : ${records}">
            <td th:text="${record.recordDate}"></td>
            <td th:text="${record.employee.username}"></td>
            <td th:text="${record.gross}"></td>
            <td th:text="${record.wins}"></td>
            <td th:text="${record.shortages}"></td>
            <td th:text="${record.balance}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
