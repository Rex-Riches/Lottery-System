<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .header{
            background:#1f3a5f;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header a{
            color:#1f3a5f;
            background:white;
            padding:8px 14px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .container{
            display:flex;
            justify-content:center;
            margin-top:50px;
        }

        .card{
            background:white;
            width:420px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:8px;
        }

        .welcome{
            text-align:center;
            margin-bottom:20px;
            color:#555;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .readonly{
            background:#eee;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#2e8b57;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
        }

        .success{
            color:green;
            text-align:center;
            margin-bottom:12px;
        }
    </style>
</head>
<body>

<div class="header">
    <h3> RECORD SYSTEM</h3>
    <a th:href="@{/logout}">Logout</a>
</div>

<div class="container">
    <div class="card">
        <h2>Daily Record Entry</h2>
        <p class="welcome">Welcome, <span th:text="${username}"></span></p>

        <p class="success" th:text="${success}"></p>

        <form th:action="@{/save-record}" method="post">
            <div class="form-group">
                <label>Gross</label>
                <input type="number" step="0.01" name="gross" required>
            </div>

            <div class="form-group">
                <label>Wins</label>
                <input type="number" step="0.01" name="wins" required>
            </div>

            <div class="form-group">
                <label>Shortages</label>
                <input type="number" step="0.01" name="shortages" required>
            </div>



            <div class="form-group">
                <label>Balance (after save)</label>
                <input class="readonly" type="text" th:value="${calculatedBalance}" readonly>
            </div>

            <button class="btn" type="submit">Save Record</button>
        </form>
    </div>
</div>

</body>
</html>
