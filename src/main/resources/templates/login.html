<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:16px;
        }

        .card{
            background:#fff;
            width:100%;
            max-width:400px;
            padding:24px;
            border-radius:10px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#1f3a5f;
            font-size:24px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            font-size:15px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2e8b57;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-top:10px;
            font-size:16px;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }

        @media (max-width: 480px){
            .card{
                padding:20px;
                border-radius:8px;
            }

            h2{
                font-size:22px;
            }

            label{
                font-size:14px;
            }

            input,
            button{
                font-size:16px;
                padding:13px;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h2>LOGIN SYSTEM</h2>

    <p class="error" th:text="${error}"></p>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
